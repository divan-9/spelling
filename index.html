
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spelling Flashcards</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        #app { text-align: center; }
        .section-links { margin-bottom: 16px; }
        .section-links a { display: inline-block; margin: 0 6px; padding: 10px 14px; border-radius: 999px; text-decoration: none; border: 1px solid #ccc; color: #222; background: white; font-weight: 600; }
        .section-links a.active { background: #2563eb; border-color: #2563eb; color: white; }

        .card {
          height: 250px;
          perspective: 1000px;
        }

        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border: 1px solid #ccc; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-front { background-color: white; }
        .card-back { background-color: #f9f9f9; transform: rotateY(180deg); }
        #controls, #navigation { margin-top: 20px; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; }
        input { padding: 10px; margin-top: 10px; }
        .diff { margin-top: 10px; }
        .diff span { padding: 2px 5px; border-radius: 3px; }
        .diff .correct { background-color: #d4edda; }
        .diff .incorrect { background-color: #f8d7da; }
    </style>
</head>
<body>

<div id="app">
    <div class="section-links">
        <a href="index.html" class="active">Spelling</a>
        <a href="math.html">Year 5 Maths</a>
    </div>
    <div id="menu">
        <button id="week1">Week 1</button>
        <button id="week2">Week 2</button>
        <button id="week3">Week 3</button>
        <button id="week4">Week 4</button>
        <button id="week5">Week 5</button>
        <button id="week6">Week 6</button>
    </div>
    <div id="flashcard" class="card">
        <div class="card-inner">
            <div class="card-front">
                <div id="definition"></div>
                <button id="pronounce">Play Pronunciation</button>
                <input type="text" id="guess" placeholder="Your guess...">
                <button id="submit">Submit</button>
            </div>
            <div class="card-back">
                <div>answer: <span id="answer" class=""></span></div>
                <div>word: <b id="word" class=""></b></div>
                <div id="diff" class="diff"></div>
                <br>
                <div id="translation"></div>
                <br>
                <div id="sample"></div>
                <br>
                <div id="stats"></div>
            </div>
        </div>
    </div>
    <div id="navigation">
        <button id="prev">Previous</button>
        <button id="flip">Flip</button>
        <button id="next">Next</button>
    </div>
    <div id="congrats" style="display: none;">
        <h1>Congratulations!</h1>
        <p>You have learned all the words for this week.</p>
    </div>
</div>

<script>
    const words = {
        week1: [
            { word: "definite", definition: "Clearly decided, certain, or exact.", translation: ["определённый", "точный"], pronunciation: "definite", sample: "We need a definite answer by Friday.", correctCount: 0, attempts: 0 },
            { word: "desperate", definition: "Feeling or showing a hopeless need or urgency.", translation: ["отчаянный", "в отчаянии"], pronunciation: "desperate", sample: "He was desperate to find his lost dog.", correctCount: 0, attempts: 0 },
            { word: "literate", definition: "Able to read and write.", translation: ["грамотный"], pronunciation: "literate", sample: "Most children become literate by the end of primary school.", correctCount: 0, attempts: 0 },
            { word: "secretary", definition: "A person whose job includes office work, letters, and arranging meetings.", translation: ["секретарь"], pronunciation: "secretary", sample: "The secretary scheduled the meeting for Monday morning.", correctCount: 0, attempts: 0 },
            { word: "stationary", definition: "Not moving; staying in one place.", translation: ["неподвижный", "стационарный"], pronunciation: "stationary", sample: "The car remained stationary at the red light.", correctCount: 0, attempts: 0 },
            { word: "dictionary", definition: "A book or digital resource that lists words and their meanings.", translation: ["словарь"], pronunciation: "dictionary", sample: "She checked the spelling in the dictionary.", correctCount: 0, attempts: 0 },
            { word: "Wednesday", definition: "The day of the week after Tuesday and before Thursday.", translation: ["среда"], pronunciation: "Wednesday", sample: "We have a music lesson on Wednesday.", correctCount: 0, attempts: 0 },
            { word: "familiar", definition: "Well known to you or easy to recognise.", translation: ["знакомый"], pronunciation: "familiar", sample: "His voice sounded familiar to me.", correctCount: 0, attempts: 0 },
            { word: "original", definition: "Existing from the beginning; first and not copied.", translation: ["первоначальный", "оригинальный"], pronunciation: "original", sample: "This is the original version of the painting.", correctCount: 0, attempts: 0 },
            { word: "animal", definition: "A living creature such as a dog, bird, or lion.", translation: ["животное"], pronunciation: "animal", sample: "The zoo has an animal from every continent.", correctCount: 0, attempts: 0 }
        ],
        week2: [
            { word: "deflate", definition: "To let air or gas out of something.", translation: ["сдувать", "спускать"], pronunciation: "deflate", sample: "Use this valve to deflate the air mattress.", correctCount: 0, attempts: 0 },
            { word: "deform", definition: "To spoil the usual shape of something.", translation: ["деформировать", "искажать"], pronunciation: "deform", sample: "The heat can deform plastic bottles.", correctCount: 0, attempts: 0 },
            { word: "decode", definition: "To change a coded message into ordinary language.", translation: ["расшифровывать"], pronunciation: "decode", sample: "The computer helped us decode the hidden message.", correctCount: 0, attempts: 0 },
            { word: "decompose", definition: "To break down into smaller parts, especially naturally.", translation: ["разлагаться", "разлагать"], pronunciation: "decompose", sample: "Leaves decompose quickly in damp soil.", correctCount: 0, attempts: 0 },
            { word: "defuse", definition: "To make a dangerous or tense situation calmer or safer.", translation: ["обезвреживать", "разряжать обстановку"], pronunciation: "defuse", sample: "She tried to defuse the argument with a joke.", correctCount: 0, attempts: 0 },
            { word: "recycle", definition: "To process used materials so they can be used again.", translation: ["перерабатывать"], pronunciation: "recycle", sample: "We recycle paper, glass, and plastic at school.", correctCount: 0, attempts: 0 },
            { word: "rebuild", definition: "To build something again after damage or destruction.", translation: ["восстанавливать", "перестраивать"], pronunciation: "rebuild", sample: "The town plans to rebuild the bridge next year.", correctCount: 0, attempts: 0 },
            { word: "rewrite", definition: "To write something again in a different or better way.", translation: ["переписывать"], pronunciation: "rewrite", sample: "Please rewrite the sentence more clearly.", correctCount: 0, attempts: 0 },
            { word: "replace", definition: "To take the place of something or someone.", translation: ["заменять"], pronunciation: "replace", sample: "We need to replace the broken window.", correctCount: 0, attempts: 0 },
            { word: "revisit", definition: "To return to a place, idea, or subject again.", translation: ["возвращаться к", "посещать снова"], pronunciation: "revisit", sample: "Let's revisit this topic after lunch.", correctCount: 0, attempts: 0 }
        ],
        week3: [
            { word: "overthrow", definition: "To remove a ruler or government from power by force.", translation: ["свергать"], pronunciation: "overthrow", sample: "The rebels planned to overthrow the king.", correctCount: 0, attempts: 0 },
            { word: "overturn", definition: "To turn over or cause something to turn over.", translation: ["опрокидывать", "переворачивать"], pronunciation: "overturn", sample: "The strong wind could overturn a small boat.", correctCount: 0, attempts: 0 },
            { word: "overslept", definition: "Slept longer than intended.", translation: ["проспал"], pronunciation: "overslept", sample: "I overslept and missed the first bus.", correctCount: 0, attempts: 0 },
            { word: "overcook", definition: "To cook something for too long.", translation: ["переварить", "пережарить"], pronunciation: "overcook", sample: "Be careful not to overcook the pasta.", correctCount: 0, attempts: 0 },
            { word: "overreact", definition: "To respond too strongly to something.", translation: ["слишком остро реагировать"], pronunciation: "overreact", sample: "He tends to overreact to small problems.", correctCount: 0, attempts: 0 },
            { word: "overestimate", definition: "To think something is greater than it really is.", translation: ["переоценивать"], pronunciation: "overestimate", sample: "Do not overestimate how much time we have.", correctCount: 0, attempts: 0 },
            { word: "overuse", definition: "To use something too much.", translation: ["чрезмерно использовать"], pronunciation: "overuse", sample: "Overuse of the phone can tire your eyes.", correctCount: 0, attempts: 0 },
            { word: "overpaid", definition: "Paid more than the correct amount for something.", translation: ["переплатил", "заплатил слишком много"], pronunciation: "overpaid", sample: "We overpaid for the tickets because we booked late.", correctCount: 0, attempts: 0 },
            { word: "overlook", definition: "To fail to notice something.", translation: ["не замечать", "упускать"], pronunciation: "overlook", sample: "I overlooked a small mistake in the report.", correctCount: 0, attempts: 0 },
            { word: "overbalance", definition: "To lose balance and nearly fall, or cause something to tip too far.", translation: ["потерять равновесие", "перевесить"], pronunciation: "overbalance", sample: "He overbalanced and nearly fell off the chair.", correctCount: 0, attempts: 0 }
        ],
        week4: [
            { word: "boastful", definition: "Talking with too much pride about yourself or your achievements.", translation: ["хвастливый"], pronunciation: "boastful", sample: "His boastful comments annoyed the team.", correctCount: 0, attempts: 0 },
            { word: "faithful", definition: "Loyal and reliable.", translation: ["верный", "преданный"], pronunciation: "faithful", sample: "The dog remained faithful to its owner.", correctCount: 0, attempts: 0 },
            { word: "doubtful", definition: "Uncertain or not likely to be true.", translation: ["сомнительный", "неуверенный"], pronunciation: "doubtful", sample: "It is doubtful that the train will arrive on time.", correctCount: 0, attempts: 0 },
            { word: "fearful", definition: "Feeling afraid or showing fear.", translation: ["испуганный", "боязливый"], pronunciation: "fearful", sample: "The child gave a fearful look at the dark room.", correctCount: 0, attempts: 0 },
            { word: "thankful", definition: "Pleased and grateful.", translation: ["благодарный"], pronunciation: "thankful", sample: "I am thankful for your help.", correctCount: 0, attempts: 0 },
            { word: "beautiful", definition: "Very pleasing to look at.", translation: ["красивый", "прекрасный"], pronunciation: "beautiful", sample: "They walked along a beautiful beach at sunset.", correctCount: 0, attempts: 0 },
            { word: "pitiful", definition: "Causing feelings of sadness or sympathy because it is so bad or small.", translation: ["жалкий", "жалостный"], pronunciation: "pitiful", sample: "The stray puppy looked pitiful in the rain.", correctCount: 0, attempts: 0 },
            { word: "plentiful", definition: "Existing in large amounts.", translation: ["обильный", "в большом количестве"], pronunciation: "plentiful", sample: "Fresh fruit is plentiful in summer.", correctCount: 0, attempts: 0 },
            { word: "fanciful", definition: "Unusual and imaginative rather than practical.", translation: ["причудливый", "фантазийный"], pronunciation: "fanciful", sample: "She wrote a fanciful story about flying cats.", correctCount: 0, attempts: 0 },
            { word: "merciful", definition: "Kind and forgiving, especially when punishment is possible.", translation: ["милосердный"], pronunciation: "merciful", sample: "The judge was merciful and gave a light sentence.", correctCount: 0, attempts: 0 }
        ],
        week5: [
            { word: "attractive", definition: "Pleasing or interesting; good-looking.", translation: ["привлекательный"], pronunciation: "attractive", sample: "The shop has an attractive window display.", correctCount: 0, attempts: 0 },
            { word: "creative", definition: "Good at making new ideas or things.", translation: ["творческий", "креативный"], pronunciation: "creative", sample: "She found a creative solution to the problem.", correctCount: 0, attempts: 0 },
            { word: "addictive", definition: "So enjoyable or habit-forming that it is hard to stop.", translation: ["вызывающий зависимость", "затягивающий"], pronunciation: "addictive", sample: "That game is so addictive that I forget the time.", correctCount: 0, attempts: 0 },
            { word: "assertive", definition: "Confident and direct without being rude.", translation: ["уверенный", "настойчивый"], pronunciation: "assertive", sample: "You need to be assertive in the meeting.", correctCount: 0, attempts: 0 },
            { word: "abusive", definition: "Using cruel, violent, or insulting words or actions.", translation: ["оскорбительный", "жестокий"], pronunciation: "abusive", sample: "The coach was punished for his abusive language.", correctCount: 0, attempts: 0 },
            { word: "co-operative", definition: "Willing to help and work well with others.", translation: ["готовый к сотрудничеству"], pronunciation: "cooperative", sample: "The class was calm and co-operative during the lesson.", correctCount: 0, attempts: 0 },
            { word: "exhaustive", definition: "Including all details; complete and thorough.", translation: ["исчерпывающий"], pronunciation: "exhaustive", sample: "The report gives an exhaustive list of the changes.", correctCount: 0, attempts: 0 },
            { word: "appreciative", definition: "Showing gratitude or understanding of value.", translation: ["благодарный", "ценящий"], pronunciation: "appreciative", sample: "The audience was appreciative after the performance.", correctCount: 0, attempts: 0 },
            { word: "offensive", definition: "Rude or upsetting; causing offence.", translation: ["оскорбительный", "обидный"], pronunciation: "offensive", sample: "His joke was offensive to many people.", correctCount: 0, attempts: 0 },
            { word: "expressive", definition: "Showing thoughts or feelings clearly.", translation: ["выразительный"], pronunciation: "expressive", sample: "Her eyes are very expressive.", correctCount: 0, attempts: 0 }
        ],
        week6: [
            { word: "musical", definition: "Related to music or good at music.", translation: ["музыкальный"], pronunciation: "musical", sample: "She comes from a very musical family.", correctCount: 0, attempts: 0 },
            { word: "political", definition: "Connected with government, politics, or public affairs.", translation: ["политический"], pronunciation: "political", sample: "The newspaper also covers political events.", correctCount: 0, attempts: 0 },
            { word: "accidental", definition: "Happening by chance and not planned.", translation: ["случайный", "непреднамеренный"], pronunciation: "accidental", sample: "The damage was accidental, not deliberate.", correctCount: 0, attempts: 0 },
            { word: "mathematical", definition: "Related to mathematics.", translation: ["математический"], pronunciation: "mathematical", sample: "He has a strong mathematical mind.", correctCount: 0, attempts: 0 },
            { word: "functional", definition: "Designed to be practical and useful.", translation: ["функциональный", "практичный"], pronunciation: "functional", sample: "The kitchen is small but very functional.", correctCount: 0, attempts: 0 },
            { word: "tropical", definition: "Coming from or typical of hot regions near the equator.", translation: ["тропический"], pronunciation: "tropical", sample: "We saw tropical plants in the greenhouse.", correctCount: 0, attempts: 0 },
            { word: "professional", definition: "Connected with skilled work, or done very well.", translation: ["профессиональный"], pronunciation: "professional", sample: "She gave a professional presentation.", correctCount: 0, attempts: 0 },
            { word: "central", definition: "In the middle or most important part.", translation: ["центральный", "главный"], pronunciation: "central", sample: "The station is in a central part of the city.", correctCount: 0, attempts: 0 },
            { word: "global", definition: "Relating to the whole world.", translation: ["глобальный", "мировой"], pronunciation: "global", sample: "Climate change is a global problem.", correctCount: 0, attempts: 0 },
            { word: "industrial", definition: "Related to industry or factories.", translation: ["промышленный"], pronunciation: "industrial", sample: "The city grew into an industrial centre.", correctCount: 0, attempts: 0 }
        ]
    };

    let currentWeek = 'week1';
    let unlearnedWords = [];
    let currentCardIndex = 0;
    let synth = window.speechSynthesis;

    const definitionEl = document.getElementById('definition');
    const translationEl = document.getElementById('translation');
    const sampleEl = document.getElementById('sample');
    const diffEl = document.getElementById('diff');
    const guessInput = document.getElementById('guess');
    const cardEl = document.getElementById('flashcard');
    const congratsEl = document.getElementById('congrats');
    const navigationEl = document.getElementById('navigation');
    const statsEl = document.getElementById('stats');
    const answerEl = document.getElementById('answer');
    const wordEl = document.getElementById('word');

    function getUnlearnedWords() {
        return words[currentWeek].filter(word => word.correctCount < 3);
    }

    function loadCard() {
        unlearnedWords = getUnlearnedWords();
        if (unlearnedWords.length === 0) {
            cardEl.style.display = 'none';
            navigationEl.style.display = 'none';
            congratsEl.style.display = 'block';
            return;
        }
        cardEl.style.display = 'block';
        navigationEl.style.display = 'block';
        congratsEl.style.display = 'none';

        const word = unlearnedWords[currentCardIndex];
        definitionEl.textContent = word.definition;
        translationEl.innerText = word.translation.join(', ');
        sampleEl.textContent = word.sample;
        statsEl.textContent = `${word.correctCount} / ${word.attempts}`;
        diffEl.innerHTML = '';
        guessInput.value = '';
        cardEl.classList.remove('flipped');
        speak(word.pronunciation);
        guessInput.focus();
    }

    function speak(text) {
        if (synth.speaking) {
            console.error('speechSynthesis.speaking');
            return;
        }
        if (text !== '') {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.onend = function (event) {
                console.log('SpeechSynthesisUtterance.onend');
            }
            utterThis.onerror = function (event) {
                console.error('SpeechSynthesisUtterance.onerror');
            }
            synth.speak(utterThis);
        }
    }

    function showDiff(guess, correct) {
        let result = '';
        let isCorrect = true;
        for (let i = 0; i < correct.length; i++) {
            if (i < guess.length && guess[i].toLowerCase() === correct[i].toLowerCase()) {
                result += `<span class="correct">${correct[i]}</span>`;
            } else {
                result += `<span class="incorrect">${correct[i]}</span>`;
                isCorrect = false;
            }
        }
        if (guess.length > correct.length) {
            result += `<span class="incorrect">${guess.substring(correct.length)}</span>`;
            isCorrect = false;
        }
        if (guess.length < correct.length) {
            isCorrect = false;
        }
        diffEl.innerHTML = result;
        return isCorrect;
    }

    document.getElementById('week1').addEventListener('click', () => {
        currentWeek = 'week1';
        words.week1.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week2').addEventListener('click', () => {
        currentWeek = 'week2';
        words.week2.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week3').addEventListener('click', () => {
        currentWeek = 'week3';
        words.week3.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week4').addEventListener('click', () => {
        currentWeek = 'week4';
        words.week4.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week5').addEventListener('click', () => {
        currentWeek = 'week5';
        words.week5.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week6').addEventListener('click', () => {
        currentWeek = 'week6';
        words.week6.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('pronounce').addEventListener('click', () => {
        speak(unlearnedWords[currentCardIndex].pronunciation);
    });

    document.getElementById('submit').addEventListener('click', () => {
        const guess = guessInput.value;
        const correct = unlearnedWords[currentCardIndex].word;
        unlearnedWords[currentCardIndex].attempts++;
        const isCorrect = showDiff(guess, correct);
        if (isCorrect) {
            unlearnedWords[currentCardIndex].correctCount++;
        }
        cardEl.classList.add('flipped');
        statsEl.textContent = `${unlearnedWords[currentCardIndex].correctCount} / ${unlearnedWords[currentCardIndex].attempts}`;
        answerEl.textContent = guess;
        wordEl.textContent = correct;
    });

    function loadNextCard() {
        if (cardEl.classList.contains('flipped')) {
            cardEl.classList.remove('flipped');
            cardEl.addEventListener('transitionend', () => {
                loadCard();
            }, { once: true });
        } else {
            loadCard();
        }
    }

    guessInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            if (cardEl.classList.contains('flipped')) {
                currentCardIndex = (currentCardIndex + 1) % unlearnedWords.length;
                loadNextCard();
            }
            else {
                document.getElementById('submit').click();
            }
        }
    });

    document.getElementById('flip').addEventListener('click', () => {
        cardEl.classList.toggle('flipped');
    });

    document.getElementById('next').addEventListener('click', () => {
        currentCardIndex = (currentCardIndex + 1) % unlearnedWords.length;
        loadNextCard();
    });

    document.getElementById('prev').addEventListener('click', () => {
        currentCardIndex = (currentCardIndex - 1 + unlearnedWords.length) % unlearnedWords.length;
        loadNextCard();
    });

    loadCard();
</script>

</body>
</html>
