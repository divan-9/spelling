
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flashcard App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        #app { text-align: center; }

        .card {
          height: 250px;
          perspective: 1000px;
        }

        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border: 1px solid #ccc; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-front { background-color: white; }
        .card-back { background-color: #f9f9f9; transform: rotateY(180deg); }
        #controls, #navigation { margin-top: 20px; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; }
        input { padding: 10px; margin-top: 10px; }
        .diff { margin-top: 10px; }
        .diff span { padding: 2px 5px; border-radius: 3px; }
        .diff .correct { background-color: #d4edda; }
        .diff .incorrect { background-color: #f8d7da; }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <button id="week1">Week 1</button>
        <button id="week2">Week 2</button>
        <button id="week3">Week 3</button>
        <button id="week4">Week 4</button>
        <button id="week5">Week 5</button>
        <button id="week6">Week 6</button>
    </div>
    <div id="flashcard" class="card">
        <div class="card-inner">
            <div class="card-front">
                <div id="definition"></div>
                <button id="pronounce">Play Pronunciation</button>
                <input type="text" id="guess" placeholder="Your guess...">
                <button id="submit">Submit</button>
            </div>
            <div class="card-back">
                <div>answer: <span id="answer" class=""></span></div>
                <div>word: <b id="word" class=""></b></div>
                <div id="diff" class="diff"></div>
                <br>
                <div id="translation"></div>
                <br>
                <div id="sample"></div>
                <br>
                <div id="stats"></div>
            </div>
        </div>
    </div>
    <div id="navigation">
        <button id="prev">Previous</button>
        <button id="flip">Flip</button>
        <button id="next">Next</button>
    </div>
    <div id="congrats" style="display: none;">
        <h1>Congratulations!</h1>
        <p>You have learned all the words for this week.</p>
    </div>
</div>

<script>
    const words = {
        week1: [
            { word: "forty", definition: "The number 40.", translation: ["сорок"], pronunciation: "forty", sample: "She is forty years old.", correctCount: 0, attempts: 0 },
            { word: "scorch", definition: "To burn the surface of something slightly.", translation: ["опалить","обжечь"], pronunciation: "scorch", sample: "The iron scorched the shirt.", correctCount: 0, attempts: 0 },
            { word: "absorb", definition: "To take in or soak up a substance.", translation: ["поглощать","впитывать"], pronunciation: "absorb", sample: "A sponge can absorb a lot of water.", correctCount: 0, attempts: 0 },
            { word: "decorate", definition: "To make something look more attractive by adding ornaments.", translation: ["украшать","декорировать"], pronunciation: "decorate", sample: "They decorated the room with balloons.", correctCount: 0, attempts: 0 },
            { word: "afford", definition: "To have enough money or resources for something.", translation: ["позволять себе"], pronunciation: "afford", sample: "I can't afford a new car right now.", correctCount: 0, attempts: 0 },
            { word: "enormous", definition: "Very large in size, quantity, or extent.", translation: ["огромный","громадный"], pronunciation: "enormous", sample: "The elephant is an enormous animal.", correctCount: 0, attempts: 0 },
            { word: "category", definition: "A class or group of things sharing common features.", translation: ["категория","раздел"], pronunciation: "category", sample: "Fiction is a popular book category.", correctCount: 0, attempts: 0 },
            { word: "tornado", definition: "A violently rotating column of air that touches the ground.", translation: ["торнадо","смерч"], pronunciation: "tornado", sample: "The tornado destroyed several houses.", correctCount: 0, attempts: 0 },
            { word: "according", definition: "As stated by; in a manner consistent with.", translation: ["согласно","в соответствии с"], pronunciation: "according", sample: "According to the weather forecast, it will rain.", correctCount: 0, attempts: 0 },
            { word: "opportunity", definition: "A set of circumstances that makes something possible.", translation: ["возможность","шанс"], pronunciation: "opportunity", sample: "This job is a great opportunity.", correctCount: 0, attempts: 0 }
        ],
        week2: [
            { word: "pause", definition: "To stop temporarily before continuing.", translation: ["пауза","сделать паузу"], pronunciation: "pause", sample: "She paused before answering the question.", correctCount: 0, attempts: 0 },
            { word: "cause", definition: "A person or thing that produces an effect; to make something happen.", translation: ["причина","вызывать"], pronunciation: "cause", sample: "What was the cause of the accident?", correctCount: 0, attempts: 0 },
            { word: "sauce", definition: "A liquid condiment served with food.", translation: ["соус"], pronunciation: "sauce", sample: "He poured tomato sauce on his pasta.", correctCount: 0, attempts: 0 },
            { word: "fraud", definition: "Wrongful deception intended to result in financial or personal gain.", translation: ["мошенничество","обман"], pronunciation: "fraud", sample: "He was arrested for bank fraud.", correctCount: 0, attempts: 0 },
            { word: "launch", definition: "To set something in motion; to start an initiative.", translation: ["запускать","начинать"], pronunciation: "launch", sample: "They plan to launch a new product next month.", correctCount: 0, attempts: 0 },
            { word: "author", definition: "A person who writes a book, article, or other text.", translation: ["автор"], pronunciation: "author", sample: "The author signed copies of her novel.", correctCount: 0, attempts: 0 },
            { word: "August", definition: "The eighth month of the year.", translation: ["август"], pronunciation: "August", sample: "School starts again in August.", correctCount: 0, attempts: 0 },
            { word: "applaud", definition: "To clap hands to show appreciation or approval.", translation: ["аплодировать"], pronunciation: "applaud", sample: "The audience applauded at the end of the show.", correctCount: 0, attempts: 0 },
            { word: "astronaut", definition: "A person trained to travel and work in space.", translation: ["астронавт","космонавт"], pronunciation: "astronaut", sample: "The astronaut floated inside the space station.", correctCount: 0, attempts: 0 },
            { word: "restaurant", definition: "A place where meals are prepared and served to customers.", translation: ["ресторан"], pronunciation: "restaurant", sample: "We booked a table at the new restaurant.", correctCount: 0, attempts: 0 }
        ],
        week3: [
            { word: "pollinate", definition: "To transfer pollen to a flower or plant to enable fertilisation.", translation: ["опылять"], pronunciation: "pollinate", sample: "Bees pollinate flowers as they collect nectar.", correctCount: 0, attempts: 0 },
            { word: "captivate", definition: "To attract and hold the attention or interest of someone.", translation: ["пленять","увлекать"], pronunciation: "captivate", sample: "The magician captivated the whole audience.", correctCount: 0, attempts: 0 },
            { word: "activate", definition: "To make something start working or become active.", translation: ["активировать","запускать"], pronunciation: "activate", sample: "Press the button to activate the alarm.", correctCount: 0, attempts: 0 },
            { word: "motivate", definition: "To provide someone with a reason to act or work harder.", translation: ["мотивировать","побуждать"], pronunciation: "motivate", sample: "Good teachers know how to motivate their students.", correctCount: 0, attempts: 0 },
            { word: "communicate", definition: "To share or exchange information, ideas, or feelings.", translation: ["общаться","передавать"], pronunciation: "communicate", sample: "It is important to communicate clearly.", correctCount: 0, attempts: 0 },
            { word: "medicate", definition: "To treat someone with medicine.", translation: ["лечить","давать лекарство"], pronunciation: "medicate", sample: "The doctor decided to medicate the patient.", correctCount: 0, attempts: 0 },
            { word: "elasticate", definition: "To make a piece of fabric or clothing stretchy by adding elastic.", translation: ["сделать эластичным"], pronunciation: "elasticate", sample: "They elasticated the waistband for a better fit.", correctCount: 0, attempts: 0 },
            { word: "hyphenate", definition: "To write or divide a word using a hyphen.", translation: ["писать через дефис"], pronunciation: "hyphenate", sample: "Some compound words are hyphenated.", correctCount: 0, attempts: 0 },
            { word: "alienate", definition: "To cause someone to feel isolated or estranged.", translation: ["отчуждать","отталкивать"], pronunciation: "alienate", sample: "His rude behaviour alienated his friends.", correctCount: 0, attempts: 0 },
            { word: "validate", definition: "To confirm the correctness, truth, or value of something.", translation: ["подтверждать","проверять"], pronunciation: "validate", sample: "Please validate your ticket before boarding.", correctCount: 0, attempts: 0 }
        ],
        week4: [
            { word: "criticise", definition: "To point out the faults or problems of someone or something.", translation: ["критиковать"], pronunciation: "criticise", sample: "It is easy to criticise but harder to help.", correctCount: 0, attempts: 0 },
            { word: "advertise", definition: "To describe and promote a product or service publicly.", translation: ["рекламировать"], pronunciation: "advertise", sample: "They advertised the sale on social media.", correctCount: 0, attempts: 0 },
            { word: "capitalise", definition: "To write a letter in upper case; to take advantage of something.", translation: ["писать с заглавной буквы","использовать в своих интересах"], pronunciation: "capitalise", sample: "Always capitalise the first word of a sentence.", correctCount: 0, attempts: 0 },
            { word: "finalise", definition: "To complete the last details of a plan or agreement.", translation: ["завершать","доработать"], pronunciation: "finalise", sample: "We need to finalise the contract by Friday.", correctCount: 0, attempts: 0 },
            { word: "equalise", definition: "To make things equal in amount, size, or degree.", translation: ["уравнивать"], pronunciation: "equalise", sample: "The team scored to equalise in the second half.", correctCount: 0, attempts: 0 },
            { word: "fertilise", definition: "To add nutrients to soil; to cause an egg to develop.", translation: ["удобрять","оплодотворять"], pronunciation: "fertilise", sample: "Farmers fertilise their fields every spring.", correctCount: 0, attempts: 0 },
            { word: "terrorise", definition: "To fill someone with terror; to threaten or intimidate.", translation: ["терроризировать","запугивать"], pronunciation: "terrorise", sample: "The bully tried to terrorise younger students.", correctCount: 0, attempts: 0 },
            { word: "socialise", definition: "To spend time mixing socially with other people.", translation: ["общаться","социализироваться"], pronunciation: "socialise", sample: "She loves to socialise at weekend parties.", correctCount: 0, attempts: 0 },
            { word: "visualise", definition: "To form a mental picture or image of something.", translation: ["визуализировать","представлять"], pronunciation: "visualise", sample: "Try to visualise your goal to stay motivated.", correctCount: 0, attempts: 0 },
            { word: "vandalise", definition: "To deliberately damage or destroy property.", translation: ["вандализировать","уничтожать"], pronunciation: "vandalise", sample: "Someone vandalised the bus stop last night.", correctCount: 0, attempts: 0 }
        ],
        week5: [
            { word: "amplify", definition: "To increase the volume, strength, or intensity of something.", translation: ["усиливать"], pronunciation: "amplify", sample: "A microphone can amplify your voice.", correctCount: 0, attempts: 0 },
            { word: "solidify", definition: "To make or become solid or firm.", translation: ["затвердевать","укреплять"], pronunciation: "solidify", sample: "The lava solidifies as it cools.", correctCount: 0, attempts: 0 },
            { word: "signify", definition: "To be a sign or symbol of; to mean.", translation: ["означать","обозначать"], pronunciation: "signify", sample: "A red light signifies danger.", correctCount: 0, attempts: 0 },
            { word: "falsify", definition: "To alter or present information in a dishonest way.", translation: ["фальсифицировать","подделывать"], pronunciation: "falsify", sample: "It is illegal to falsify official documents.", correctCount: 0, attempts: 0 },
            { word: "glorify", definition: "To praise or describe something as admirable or wonderful.", translation: ["прославлять","превозносить"], pronunciation: "glorify", sample: "The film glorified the life of the explorer.", correctCount: 0, attempts: 0 },
            { word: "notify", definition: "To inform someone officially or formally.", translation: ["уведомлять","сообщать"], pronunciation: "notify", sample: "Please notify us if your address changes.", correctCount: 0, attempts: 0 },
            { word: "testify", definition: "To give evidence under oath in a court of law.", translation: ["свидетельствовать","давать показания"], pronunciation: "testify", sample: "The witness was asked to testify in court.", correctCount: 0, attempts: 0 },
            { word: "purify", definition: "To remove contaminants and make something clean.", translation: ["очищать"], pronunciation: "purify", sample: "This filter can purify drinking water.", correctCount: 0, attempts: 0 },
            { word: "intensify", definition: "To become or make more intense or severe.", translation: ["усиливать","интенсифицировать"], pronunciation: "intensify", sample: "The storm began to intensify overnight.", correctCount: 0, attempts: 0 },
            { word: "classify", definition: "To arrange items into groups based on shared characteristics.", translation: ["классифицировать","засекречивать"], pronunciation: "classify", sample: "Scientists classify animals into different species.", correctCount: 0, attempts: 0 }
        ],
        week6: [
            { word: "blacken", definition: "To make or become black or dark.", translation: ["чернить","темнеть"], pronunciation: "blacken", sample: "Smoke began to blacken the ceiling.", correctCount: 0, attempts: 0 },
            { word: "brighten", definition: "To make or become brighter or more cheerful.", translation: ["освещать","просветлеть"], pronunciation: "brighten", sample: "Fresh flowers can brighten any room.", correctCount: 0, attempts: 0 },
            { word: "flatten", definition: "To make or become flat or level.", translation: ["выравнивать","расплющивать"], pronunciation: "flatten", sample: "Roll the dough to flatten it evenly.", correctCount: 0, attempts: 0 },
            { word: "lengthen", definition: "To make or become longer.", translation: ["удлинять","продлевать"], pronunciation: "lengthen", sample: "The tailor can lengthen the trousers.", correctCount: 0, attempts: 0 },
            { word: "mistaken", definition: "Wrong in one's opinion or judgement.", translation: ["ошибочный","заблуждающийся"], pronunciation: "mistaken", sample: "I think you are mistaken about the date.", correctCount: 0, attempts: 0 },
            { word: "straighten", definition: "To make or become straight or tidy.", translation: ["выпрямлять","исправлять"], pronunciation: "straighten", sample: "He stopped to straighten his tie.", correctCount: 0, attempts: 0 },
            { word: "shorten", definition: "To make or become shorter.", translation: ["укорачивать","сокращать"], pronunciation: "shorten", sample: "Can you shorten the report to one page?", correctCount: 0, attempts: 0 },
            { word: "thicken", definition: "To make or become thicker or denser.", translation: ["загущать","утолщать"], pronunciation: "thicken", sample: "Add flour to thicken the sauce.", correctCount: 0, attempts: 0 },
            { word: "tighten", definition: "To make or become tight or tighter.", translation: ["затягивать","ужесточать"], pronunciation: "tighten", sample: "Use a spanner to tighten the bolt.", correctCount: 0, attempts: 0 },
            { word: "toughen", definition: "To make or become stronger or more resilient.", translation: ["закалять","ужесточать"], pronunciation: "toughen", sample: "Training will toughen up the young soldiers.", correctCount: 0, attempts: 0 }
        ]
    };

    let currentWeek = 'week1';
    let unlearnedWords = [];
    let currentCardIndex = 0;
    let synth = window.speechSynthesis;

    const definitionEl = document.getElementById('definition');
    const translationEl = document.getElementById('translation');
    const sampleEl = document.getElementById('sample');
    const diffEl = document.getElementById('diff');
    const guessInput = document.getElementById('guess');
    const cardEl = document.getElementById('flashcard');
    const congratsEl = document.getElementById('congrats');
    const navigationEl = document.getElementById('navigation');
    const statsEl = document.getElementById('stats');
    const answerEl = document.getElementById('answer');
    const wordEl = document.getElementById('word');

    function getUnlearnedWords() {
        return words[currentWeek].filter(word => word.correctCount < 3);
    }

    function loadCard() {
        unlearnedWords = getUnlearnedWords();
        if (unlearnedWords.length === 0) {
            cardEl.style.display = 'none';
            navigationEl.style.display = 'none';
            congratsEl.style.display = 'block';
            return;
        }
        cardEl.style.display = 'block';
        navigationEl.style.display = 'block';
        congratsEl.style.display = 'none';

        const word = unlearnedWords[currentCardIndex];
        definitionEl.textContent = word.definition;
        translationEl.innerText = word.translation.join(', ');
        sampleEl.textContent = word.sample;
        statsEl.textContent = `${word.correctCount} / ${word.attempts}`;
        diffEl.innerHTML = '';
        guessInput.value = '';
        cardEl.classList.remove('flipped');
        speak(word.pronunciation);
        guessInput.focus();
    }

    function speak(text) {
        if (synth.speaking) {
            console.error('speechSynthesis.speaking');
            return;
        }
        if (text !== '') {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.onend = function (event) {
                console.log('SpeechSynthesisUtterance.onend');
            }
            utterThis.onerror = function (event) {
                console.error('SpeechSynthesisUtterance.onerror');
            }
            synth.speak(utterThis);
        }
    }

    function showDiff(guess, correct) {
        let result = '';
        let isCorrect = true;
        for (let i = 0; i < correct.length; i++) {
            if (i < guess.length && guess[i].toLowerCase() === correct[i].toLowerCase()) {
                result += `<span class="correct">${correct[i]}</span>`;
            } else {
                result += `<span class="incorrect">${correct[i]}</span>`;
                isCorrect = false;
            }
        }
        if (guess.length > correct.length) {
            result += `<span class="incorrect">${guess.substring(correct.length)}</span>`;
            isCorrect = false;
        }
        if (guess.length < correct.length) {
            isCorrect = false;
        }
        diffEl.innerHTML = result;
        return isCorrect;
    }

    document.getElementById('week1').addEventListener('click', () => {
        currentWeek = 'week1';
        words.week1.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week2').addEventListener('click', () => {
        currentWeek = 'week2';
        words.week2.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week3').addEventListener('click', () => {
        currentWeek = 'week3';
        words.week3.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week4').addEventListener('click', () => {
        currentWeek = 'week4';
        words.week4.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week5').addEventListener('click', () => {
        currentWeek = 'week5';
        words.week5.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week6').addEventListener('click', () => {
        currentWeek = 'week6';
        words.week6.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('pronounce').addEventListener('click', () => {
        speak(unlearnedWords[currentCardIndex].pronunciation);
    });

    document.getElementById('submit').addEventListener('click', () => {
        const guess = guessInput.value;
        const correct = unlearnedWords[currentCardIndex].word;
        unlearnedWords[currentCardIndex].attempts++;
        const isCorrect = showDiff(guess, correct);
        if (isCorrect) {
            unlearnedWords[currentCardIndex].correctCount++;
        }
        cardEl.classList.add('flipped');
        statsEl.textContent = `${unlearnedWords[currentCardIndex].correctCount} / ${unlearnedWords[currentCardIndex].attempts}`;
        answerEl.textContent = guess;
        wordEl.textContent = correct;
    });

    function loadNextCard() {
        if (cardEl.classList.contains('flipped')) {
            cardEl.classList.remove('flipped');
            cardEl.addEventListener('transitionend', () => {
                loadCard();
            }, { once: true });
        } else {
            loadCard();
        }
    }

    guessInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            if (cardEl.classList.contains('flipped')) {
                currentCardIndex = (currentCardIndex + 1) % unlearnedWords.length;
                loadNextCard();
            }
            else {
                document.getElementById('submit').click();
            }
        }
    });

    document.getElementById('flip').addEventListener('click', () => {
        cardEl.classList.toggle('flipped');
    });

    document.getElementById('next').addEventListener('click', () => {
        currentCardIndex = (currentCardIndex + 1) % unlearnedWords.length;
        loadNextCard();
    });

    document.getElementById('prev').addEventListener('click', () => {
        currentCardIndex = (currentCardIndex - 1 + unlearnedWords.length) % unlearnedWords.length;
        loadNextCard();
    });

    loadCard();
</script>

</body>
</html>
