
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flashcard App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        #app { text-align: center; }

        .card {
          height: 250px;
          perspective: 1000px;
        }

        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border: 1px solid #ccc; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-front { background-color: white; }
        .card-back { background-color: #f9f9f9; transform: rotateY(180deg); }
        #controls, #navigation { margin-top: 20px; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; }
        input { padding: 10px; margin-top: 10px; }
        .diff { margin-top: 10px; }
        .diff span { padding: 2px 5px; border-radius: 3px; }
        .diff .correct { background-color: #d4edda; }
        .diff .incorrect { background-color: #f8d7da; }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <button id="week1">Week 1</button>
        <button id="week2">Week 2</button>
        <button id="week3">Week 3</button>
        <button id="week4">Week 4</button>
        <button id="week5">Week 5</button>
        <button id="week6">Week 6</button>
    </div>
    <div id="flashcard" class="card">
        <div class="card-inner">
            <div class="card-front">
                <div id="definition"></div>
                <button id="pronounce">Play Pronunciation</button>
                <input type="text" id="guess" placeholder="Your guess...">
                <button id="submit">Submit</button>
            </div>
            <div class="card-back">
                <div>answer: <span id="answer" class=""></span></div>
                <div>word: <b id="word" class=""></b></div>
                <div id="diff" class="diff"></div>
                <br>
                <div id="translation"></div>
                <br>
                <div id="sample"></div>
                <br>
                <div id="stats"></div>
            </div>
        </div>
    </div>
    <div id="navigation">
        <button id="prev">Previous</button>
        <button id="flip">Flip</button>
        <button id="next">Next</button>
    </div>
    <div id="congrats" style="display: none;">
        <h1>Congratulations!</h1>
        <p>You have learned all the words for this week.</p>
    </div>
</div>

<script>
    const words = {
        week1: [
            { word: "though", definition: "Despite the fact that; however.", translation: ["хотя", "однако"], pronunciation: "though", sample: "Though it was raining, we still went for a walk.", correctCount: 0, attempts: 0 },
            { word: "although", definition: "In spite of the fact that.", translation: ["хотя", "несмотря на то что"], pronunciation: "although", sample: "Although he was tired, he finished his homework.", correctCount: 0, attempts: 0 },
            { word: "dough", definition: "A mixture of flour and liquid used for baking bread or pastry.", translation: ["тесто"], pronunciation: "dough", sample: "She left the dough to rise in a warm place.", correctCount: 0, attempts: 0 },
            { word: "doughnut", definition: "A small sweet fried cake, often ring-shaped.", translation: ["пончик"], pronunciation: "doughnut", sample: "He bought a jam doughnut from the bakery.", correctCount: 0, attempts: 0 },
            { word: "through", definition: "From one side or end to the other.", translation: ["через", "сквозь"], pronunciation: "through", sample: "Sunlight shone through the window.", correctCount: 0, attempts: 0 },
            { word: "cough", definition: "To force air out of the throat with a sudden noisy sound.", translation: ["кашлять", "кашель"], pronunciation: "cough", sample: "If you have a cough, drink plenty of water.", correctCount: 0, attempts: 0 },
            { word: "trough", definition: "A long narrow container for food or water for animals.", translation: ["корыто", "желоб"], pronunciation: "trough", sample: "The farmer filled the trough with fresh water.", correctCount: 0, attempts: 0 },
            { word: "rough", definition: "Not smooth or even; uneven or coarse.", translation: ["шероховатый", "грубый"], pronunciation: "rough", sample: "The path was rough and hard to walk on.", correctCount: 0, attempts: 0 },
            { word: "tough", definition: "Strong and difficult to break or deal with.", translation: ["крепкий", "трудный"], pronunciation: "tough", sample: "It was a tough match, but our team won.", correctCount: 0, attempts: 0 },
            { word: "enough", definition: "As much or as many as needed.", translation: ["достаточно"], pronunciation: "enough", sample: "We have enough time to catch the bus.", correctCount: 0, attempts: 0 }
        ],
        week2: [
            { word: "plough", definition: "A farm tool or machine used to turn over soil; to turn over soil with it.", translation: ["плуг", "пахать"], pronunciation: "plough", sample: "Farmers plough the fields before planting seeds.", correctCount: 0, attempts: 0 },
            { word: "bough", definition: "A large branch of a tree.", translation: ["сук", "ветвь дерева"], pronunciation: "bough", sample: "A bird was sitting on the bough of the oak tree.", correctCount: 0, attempts: 0 },
            { word: "drought", definition: "A long period of unusually low rainfall.", translation: ["засуха"], pronunciation: "drought", sample: "The drought damaged crops across the region.", correctCount: 0, attempts: 0 },
            { word: "brought", definition: "Past tense and past participle of bring.", translation: ["принёс", "привёл"], pronunciation: "brought", sample: "She brought her favourite book to school.", correctCount: 0, attempts: 0 },
            { word: "bought", definition: "Past tense and past participle of buy.", translation: ["купил", "купила"], pronunciation: "bought", sample: "We bought fresh fruit at the market.", correctCount: 0, attempts: 0 },
            { word: "wrought", definition: "Worked into shape, especially of metal; caused.", translation: ["кованый", "вызванный"], pronunciation: "wrought", sample: "The gate was made of wrought iron.", correctCount: 0, attempts: 0 },
            { word: "thought", definition: "An idea or opinion produced by thinking; past tense of think.", translation: ["мысль", "думал"], pronunciation: "thought", sample: "Her first thought was to call for help.", correctCount: 0, attempts: 0 },
            { word: "ought", definition: "Used to say what is right, advisable, or expected.", translation: ["следует", "должен"], pronunciation: "ought", sample: "You ought to apologise for being late.", correctCount: 0, attempts: 0 },
            { word: "borough", definition: "A town or district that has its own local government.", translation: ["городской район", "боро"], pronunciation: "borough", sample: "She works for the local borough council.", correctCount: 0, attempts: 0 },
            { word: "thorough", definition: "Complete, careful, and detailed.", translation: ["тщательный", "полный"], pronunciation: "thorough", sample: "The police carried out a thorough investigation.", correctCount: 0, attempts: 0 }
        ],
        week3: [
            { word: "yesterday", definition: "On the day before today.", translation: ["вчера"], pronunciation: "yesterday", sample: "I saw my cousin yesterday after school.", correctCount: 0, attempts: 0 },
            { word: "tomorrow", definition: "On the day after today.", translation: ["завтра"], pronunciation: "tomorrow", sample: "We are going to the museum tomorrow.", correctCount: 0, attempts: 0 },
            { word: "later", definition: "At a time after the present or after a time mentioned.", translation: ["позже"], pronunciation: "later", sample: "I will finish my homework later this evening.", correctCount: 0, attempts: 0 },
            { word: "immediately", definition: "At once; without delay.", translation: ["немедленно", "сразу"], pronunciation: "immediately", sample: "Please come here immediately.", correctCount: 0, attempts: 0 },
            { word: "earlier", definition: "Before the usual or expected time.", translation: ["раньше"], pronunciation: "earlier", sample: "She arrived earlier than everyone else.", correctCount: 0, attempts: 0 },
            { word: "eventually", definition: "In the end, especially after a long time.", translation: ["в конце концов", "со временем"], pronunciation: "eventually", sample: "After several attempts, he eventually solved the puzzle.", correctCount: 0, attempts: 0 },
            { word: "recently", definition: "Not long ago.", translation: ["недавно"], pronunciation: "recently", sample: "I recently started learning to cook.", correctCount: 0, attempts: 0 },
            { word: "previously", definition: "At an earlier time; before now.", translation: ["ранее", "прежде"], pronunciation: "previously", sample: "The building was previously a library.", correctCount: 0, attempts: 0 },
            { word: "finally", definition: "At the end of a process or series of events.", translation: ["наконец", "в итоге"], pronunciation: "finally", sample: "We finally reached the top of the hill.", correctCount: 0, attempts: 0 },
            { word: "lately", definition: "Recently; in the recent past.", translation: ["в последнее время", "недавно"], pronunciation: "lately", sample: "Have you seen Anna lately?", correctCount: 0, attempts: 0 }
        ],
        week4: [
            { word: "nearby", definition: "Not far away.", translation: ["поблизости", "рядом"], pronunciation: "nearby", sample: "There is a small park nearby.", correctCount: 0, attempts: 0 },
            { word: "everywhere", definition: "In or to all places.", translation: ["везде", "повсюду"], pronunciation: "everywhere", sample: "We looked everywhere for the missing key.", correctCount: 0, attempts: 0 },
            { word: "nowhere", definition: "In or to no place.", translation: ["нигде", "никуда"], pronunciation: "nowhere", sample: "The village is so small that it seems to be in the middle of nowhere.", correctCount: 0, attempts: 0 },
            { word: "inside", definition: "In or into the inner part of something.", translation: ["внутри", "внутрь"], pronunciation: "inside", sample: "Please wait inside the building.", correctCount: 0, attempts: 0 },
            { word: "downstairs", definition: "To or on a lower floor of a building.", translation: ["внизу", "вниз по лестнице"], pronunciation: "downstairs", sample: "My grandparents are sitting downstairs.", correctCount: 0, attempts: 0 },
            { word: "outside", definition: "On or to the outer side of something.", translation: ["снаружи", "на улице"], pronunciation: "outside", sample: "The children are playing outside.", correctCount: 0, attempts: 0 },
            { word: "upstairs", definition: "To or on an upper floor of a building.", translation: ["наверху", "вверх по лестнице"], pronunciation: "upstairs", sample: "Her bedroom is upstairs.", correctCount: 0, attempts: 0 },
            { word: "underneath", definition: "Directly under or below something.", translation: ["под", "снизу"], pronunciation: "underneath", sample: "The cat was hiding underneath the table.", correctCount: 0, attempts: 0 },
            { word: "behind", definition: "At the back of or further back than something.", translation: ["позади", "за"], pronunciation: "behind", sample: "He stood behind the door and waited.", correctCount: 0, attempts: 0 },
            { word: "somewhere", definition: "In or to a place that is not known or not stated.", translation: ["где-то", "куда-то"], pronunciation: "somewhere", sample: "I left my glasses somewhere in the kitchen.", correctCount: 0, attempts: 0 }
        ],
        week5: [
            { word: "sincere", definition: "Honest and genuine.", translation: ["искренний"], pronunciation: "sincere", sample: "She gave me a sincere apology.", correctCount: 0, attempts: 0 },
            { word: "interfere", definition: "To get involved in a way that is not wanted or helpful.", translation: ["вмешиваться", "мешать"], pronunciation: "interfere", sample: "Try not to interfere in other people's arguments.", correctCount: 0, attempts: 0 },
            { word: "sphere", definition: "A round three-dimensional shape like a ball; an area of activity.", translation: ["сфера", "шар"], pronunciation: "sphere", sample: "The Earth is not a perfect sphere.", correctCount: 0, attempts: 0 },
            { word: "adhere", definition: "To stick firmly to something; to follow closely.", translation: ["прилипать", "придерживаться"], pronunciation: "adhere", sample: "The label did not adhere to the wet surface.", correctCount: 0, attempts: 0 },
            { word: "severe", definition: "Very serious, harsh, or intense.", translation: ["серьёзный", "суровый"], pronunciation: "severe", sample: "The town suffered severe flooding after the storm.", correctCount: 0, attempts: 0 },
            { word: "persevere", definition: "To continue trying despite difficulty.", translation: ["упорствовать", "не сдаваться"], pronunciation: "persevere", sample: "If you persevere, you will improve your skills.", correctCount: 0, attempts: 0 },
            { word: "atmosphere", definition: "The layer of gases around a planet; the feeling of a place.", translation: ["атмосфера"], pronunciation: "atmosphere", sample: "The restaurant had a warm and friendly atmosphere.", correctCount: 0, attempts: 0 },
            { word: "mere", definition: "Only this and nothing more.", translation: ["всего лишь", "простой"], pronunciation: "mere", sample: "It took a mere five minutes to finish.", correctCount: 0, attempts: 0 },
            { word: "hemisphere", definition: "Half of the Earth or half of a sphere.", translation: ["полушарие"], pronunciation: "hemisphere", sample: "Australia is in the Southern Hemisphere.", correctCount: 0, attempts: 0 },
            { word: "austere", definition: "Plain, simple, and without decoration; strict or serious.", translation: ["аскетичный", "суровый"], pronunciation: "austere", sample: "The room had an austere design with bare walls.", correctCount: 0, attempts: 0 }
        ],
        week6: [
            { word: "amateur", definition: "A person who does something for pleasure rather than as a job.", translation: ["любитель", "непрофессионал"], pronunciation: "amateur", sample: "Although he is an amateur photographer, his pictures are excellent.", correctCount: 0, attempts: 0 },
            { word: "ancient", definition: "Very old; from a long time ago.", translation: ["древний", "старинный"], pronunciation: "ancient", sample: "They visited an ancient castle on the hill.", correctCount: 0, attempts: 0 },
            { word: "bargain", definition: "Something bought for less than the usual price; to negotiate.", translation: ["выгодная покупка", "торговаться"], pronunciation: "bargain", sample: "This jacket was a real bargain in the sale.", correctCount: 0, attempts: 0 },
            { word: "muscle", definition: "A body tissue that produces movement.", translation: ["мышца"], pronunciation: "muscle", sample: "Regular exercise helps build muscle.", correctCount: 0, attempts: 0 },
            { word: "queue", definition: "A line of people or vehicles waiting for something.", translation: ["очередь"], pronunciation: "queue", sample: "We stood in a long queue for the tickets.", correctCount: 0, attempts: 0 },
            { word: "recognise", definition: "To know someone or something because you have seen or heard it before.", translation: ["узнавать", "признавать"], pronunciation: "recognise", sample: "I did not recognise him at first.", correctCount: 0, attempts: 0 },
            { word: "twelfth", definition: "Coming after the eleventh in order.", translation: ["двенадцатый"], pronunciation: "twelfth", sample: "Her birthday is on the twelfth of June.", correctCount: 0, attempts: 0 },
            { word: "identity", definition: "Who a person is, or the facts about them.", translation: ["личность", "идентичность"], pronunciation: "identity", sample: "The police checked his identity before letting him enter.", correctCount: 0, attempts: 0 },
            { word: "develop", definition: "To grow or cause something to grow or change.", translation: ["развивать", "развиваться"], pronunciation: "develop", sample: "Children develop quickly in their first years of life.", correctCount: 0, attempts: 0 },
            { word: "harass", definition: "To annoy or upset someone repeatedly.", translation: ["донимать", "преследовать"], pronunciation: "harass", sample: "It is wrong to harass people online.", correctCount: 0, attempts: 0 }
        ]
    };

    let currentWeek = 'week1';
    let unlearnedWords = [];
    let currentCardIndex = 0;
    let synth = window.speechSynthesis;

    const definitionEl = document.getElementById('definition');
    const translationEl = document.getElementById('translation');
    const sampleEl = document.getElementById('sample');
    const diffEl = document.getElementById('diff');
    const guessInput = document.getElementById('guess');
    const cardEl = document.getElementById('flashcard');
    const congratsEl = document.getElementById('congrats');
    const navigationEl = document.getElementById('navigation');
    const statsEl = document.getElementById('stats');
    const answerEl = document.getElementById('answer');
    const wordEl = document.getElementById('word');

    function getUnlearnedWords() {
        return words[currentWeek].filter(word => word.correctCount < 3);
    }

    function loadCard() {
        unlearnedWords = getUnlearnedWords();
        if (unlearnedWords.length === 0) {
            cardEl.style.display = 'none';
            navigationEl.style.display = 'none';
            congratsEl.style.display = 'block';
            return;
        }
        cardEl.style.display = 'block';
        navigationEl.style.display = 'block';
        congratsEl.style.display = 'none';

        const word = unlearnedWords[currentCardIndex];
        definitionEl.textContent = word.definition;
        translationEl.innerText = word.translation.join(', ');
        sampleEl.textContent = word.sample;
        statsEl.textContent = `${word.correctCount} / ${word.attempts}`;
        diffEl.innerHTML = '';
        guessInput.value = '';
        cardEl.classList.remove('flipped');
        speak(word.pronunciation);
        guessInput.focus();
    }

    function speak(text) {
        if (synth.speaking) {
            console.error('speechSynthesis.speaking');
            return;
        }
        if (text !== '') {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.onend = function (event) {
                console.log('SpeechSynthesisUtterance.onend');
            }
            utterThis.onerror = function (event) {
                console.error('SpeechSynthesisUtterance.onerror');
            }
            synth.speak(utterThis);
        }
    }

    function showDiff(guess, correct) {
        let result = '';
        let isCorrect = true;
        for (let i = 0; i < correct.length; i++) {
            if (i < guess.length && guess[i].toLowerCase() === correct[i].toLowerCase()) {
                result += `<span class="correct">${correct[i]}</span>`;
            } else {
                result += `<span class="incorrect">${correct[i]}</span>`;
                isCorrect = false;
            }
        }
        if (guess.length > correct.length) {
            result += `<span class="incorrect">${guess.substring(correct.length)}</span>`;
            isCorrect = false;
        }
        if (guess.length < correct.length) {
            isCorrect = false;
        }
        diffEl.innerHTML = result;
        return isCorrect;
    }

    document.getElementById('week1').addEventListener('click', () => {
        currentWeek = 'week1';
        words.week1.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week2').addEventListener('click', () => {
        currentWeek = 'week2';
        words.week2.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week3').addEventListener('click', () => {
        currentWeek = 'week3';
        words.week3.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week4').addEventListener('click', () => {
        currentWeek = 'week4';
        words.week4.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week5').addEventListener('click', () => {
        currentWeek = 'week5';
        words.week5.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('week6').addEventListener('click', () => {
        currentWeek = 'week6';
        words.week6.forEach(word => { word.correctCount = 0; word.attempts = 0; });
        currentCardIndex = 0;
        loadCard();
    });

    document.getElementById('pronounce').addEventListener('click', () => {
        speak(unlearnedWords[currentCardIndex].pronunciation);
    });

    document.getElementById('submit').addEventListener('click', () => {
        const guess = guessInput.value;
        const correct = unlearnedWords[currentCardIndex].word;
        unlearnedWords[currentCardIndex].attempts++;
        const isCorrect = showDiff(guess, correct);
        if (isCorrect) {
            unlearnedWords[currentCardIndex].correctCount++;
        }
        cardEl.classList.add('flipped');
        statsEl.textContent = `${unlearnedWords[currentCardIndex].correctCount} / ${unlearnedWords[currentCardIndex].attempts}`;
        answerEl.textContent = guess;
        wordEl.textContent = correct;
    });

    function loadNextCard() {
        if (cardEl.classList.contains('flipped')) {
            cardEl.classList.remove('flipped');
            cardEl.addEventListener('transitionend', () => {
                loadCard();
            }, { once: true });
        } else {
            loadCard();
        }
    }

    guessInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            if (cardEl.classList.contains('flipped')) {
                currentCardIndex = (currentCardIndex + 1) % unlearnedWords.length;
                loadNextCard();
            }
            else {
                document.getElementById('submit').click();
            }
        }
    });

    document.getElementById('flip').addEventListener('click', () => {
        cardEl.classList.toggle('flipped');
    });

    document.getElementById('next').addEventListener('click', () => {
        currentCardIndex = (currentCardIndex + 1) % unlearnedWords.length;
        loadNextCard();
    });

    document.getElementById('prev').addEventListener('click', () => {
        currentCardIndex = (currentCardIndex - 1 + unlearnedWords.length) % unlearnedWords.length;
        loadNextCard();
    });

    loadCard();
</script>

</body>
</html>
