<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 5 Maths Session</title>
    <style>
        :root {
            --bg: #eef4ff;
            --panel: #ffffff;
            --card-front: #f7fbff;
            --card-back: #ffffff;
            --border: #d9e3f0;
            --text: #172033;
            --muted: #667085;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --success: #16a34a;
            --success-dark: #15803d;
            --shadow: 0 18px 50px rgba(37, 99, 235, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(180deg, #f3f7ff 0%, var(--bg) 100%);
            font-family: Arial, sans-serif;
            color: var(--text);
        }

        .app {
            width: min(920px, 100%);
        }

        .session-shell,
        .end-screen {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .session-top {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: stretch;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .stat-pill {
            flex: 1 1 180px;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 16px;
            background: #fbfdff;
        }

        .stat-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 30px;
            font-weight: 800;
            line-height: 1.1;
        }

        .flashcard {
            perspective: 1600px;
        }

        .flashcard-inner {
            position: relative;
            min-height: 470px;
            transform-style: preserve-3d;
            transition: transform 0.8s;
        }

        .flashcard.is-flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 26px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-front {
            background: var(--card-front);
            align-items: center;
            text-align: center;
        }

        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
            justify-content: flex-start;
        }

        .category-badge {
            display: inline-block;
            align-self: center;
            padding: 8px 14px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .term {
            margin: 0 0 14px;
            font-size: clamp(34px, 6vw, 56px);
            line-height: 1.05;
        }

        .hint {
            margin: 0;
            max-width: 620px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        .back-grid {
            display: grid;
            gap: 14px;
        }

        .info-box {
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            background: #fbfdff;
        }

        .continue-wrap {
            display: none;
            margin-top: 4px;
        }

        .continue-wrap.visible {
            display: block;
        }

        .continue-btn {
            width: 100%;
            background: var(--accent);
            color: white;
        }

        .continue-btn:hover {
            background: var(--accent-dark);
        }

        .info-title {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .translation {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
        }

        .explanation,
        .example-en,
        .example-ru {
            margin: 0;
            font-size: 18px;
            line-height: 1.55;
        }

        .example-ru {
            margin-top: 8px;
            color: var(--muted);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .option-btn {
            min-height: 88px;
            background: #eef4ff;
            color: var(--text);
            border: 1px solid var(--border);
            text-align: left;
            line-height: 1.35;
        }

        .option-btn:hover {
            background: #e4edff;
        }

        .option-btn.correct,
        .option-btn:disabled.correct {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }

        .option-btn.incorrect,
        .option-btn:disabled.incorrect {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fca5a5;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 1;
        }

        .end-screen {
            display: none;
            text-align: center;
        }

        .end-screen h1 {
            margin: 0 0 12px;
            font-size: clamp(30px, 5vw, 46px);
        }

        .end-screen p {
            margin: 10px 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        .result-box {
            margin: 18px auto 0;
            max-width: 420px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: #fbfdff;
            padding: 18px;
        }

        .result-number {
            font-size: 56px;
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
        }

        .retry-btn {
            margin-top: 22px;
            min-width: 240px;
            background: var(--accent);
            color: white;
        }

        .retry-btn:hover {
            background: var(--accent-dark);
        }

        @media (max-width: 720px) {
            .session-shell,
            .end-screen {
                padding: 16px;
                border-radius: 22px;
            }

            .flashcard-inner {
                min-height: 530px;
            }

            .card-face {
                padding: 18px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .translation {
                font-size: 24px;
            }

            .explanation,
            .example-en,
            .example-ru,
            .hint {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <section id="sessionScreen" class="session-shell">
        <div class="session-top">
            <div class="stat-pill">
                <span class="stat-label">Время</span>
                <div class="stat-value" id="timer">01:00</div>
            </div>
            <div class="stat-pill">
                <span class="stat-label">Пройдено карточек</span>
                <div class="stat-value" id="passedCount">0</div>
            </div>
            <div class="stat-pill">
                <span class="stat-label">Рекорд</span>
                <div class="stat-value" id="bestScore">0</div>
            </div>
        </div>

        <div id="flashcard" class="flashcard">
            <div class="flashcard-inner">
                <div class="card-face card-front">
                    <div class="category-badge" id="frontCategory"></div>
                    <h1 class="term" id="frontTerm"></h1>
                    <p class="hint" id="frontHint">Выбери правильный перевод термина. Если ответ неверный, карточка покажет объяснение и вернётся позже.</p>
                </div>
                <div class="card-face card-back">
                    <div class="category-badge" id="backCategory"></div>
                    <div class="back-grid">
                        <div class="info-box">
                            <span class="info-title">Перевод</span>
                            <div class="translation" id="backTranslation"></div>
                        </div>
                        <div class="info-box">
                            <span class="info-title">Пояснение</span>
                            <p class="explanation" id="backExplanation"></p>
                        </div>
                        <div class="info-box">
                            <span class="info-title">Пример</span>
                            <p class="example-en" id="backExampleEn"></p>
                            <p class="example-ru" id="backExampleRu"></p>
                        </div>
                        <div id="continueWrap" class="continue-wrap">
                            <button id="continueBtn" class="continue-btn">Продолжить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="optionBtn0" class="option-btn"></button>
            <button id="optionBtn1" class="option-btn"></button>
            <button id="optionBtn2" class="option-btn"></button>
            <button id="optionBtn3" class="option-btn"></button>
        </div>
    </section>

    <section id="endScreen" class="end-screen">
        <h1 id="endTitle">Отличная работа!</h1>
        <p id="endText">Сессия завершена.</p>
        <div class="result-box">
            <div class="result-number" id="finalCount">0</div>
            <p>карточек пройдено за эту сессию</p>
            <p><strong>Лучший результат:</strong> <span id="bestScoreEnd">0</span></p>
            <p id="recordMessage"></p>
        </div>
        <button id="retryBtn" class="retry-btn">Попробовать ещё раз</button>
    </section>
</div>

    const finalCountEl = document.getElementById('finalCount');
    const bestScoreEndEl = document.getElementById('bestScoreEnd');
    const recordMessageEl = document.getElementById('recordMessage');
    const retryBtn = document.getElementById('retryBtn');

    const state = {
        deck: [],
        currentIndex: 0,
        passed: 0,
        timeLeft: SESSION_SECONDS,
        timerId: null,
        feedbackTimerId: null,
        ended: false,
        paused: false,
        pendingSessionEnd: false,
        options: [],
        answerLocked: false
    };

    let bestScore = loadBestScore();
    let errorStats = loadErrorStats();

    function loadBestScore() {
        if (typeof localStorage === 'undefined') {
            return 0;
        }

        const savedValue = Number(localStorage.getItem(BEST_SCORE_KEY));
        return Number.isFinite(savedValue) ? savedValue : 0;
    }

    function saveBestScore(value) {
        if (typeof localStorage === 'undefined') {
            return;
        }

        localStorage.setItem(BEST_SCORE_KEY, String(value));
    }

    function loadErrorStats() {
        if (typeof localStorage === 'undefined') {
            return {};
        }

        try {
            const rawValue = localStorage.getItem(ERROR_STATS_KEY);
            if (!rawValue) {
                return {};
            }

            const parsedValue = JSON.parse(rawValue);
            if (!parsedValue || typeof parsedValue !== 'object') {
                return {};
            }

            const normalized = {};
            Object.keys(parsedValue).forEach(function (key) {
                const value = Number(parsedValue[key]);
                if (Number.isFinite(value) && value > 0) {
                    normalized[key] = value;
                }
            });
            return normalized;
        } catch (error) {
            return {};
        }
    }

    function saveErrorStats() {
        if (typeof localStorage === 'undefined') {
            return;
        }

        localStorage.setItem(ERROR_STATS_KEY, JSON.stringify(errorStats));
    }

    function getErrorCount(card) {
        return errorStats[card.id] || 0;
    }

    function recordMistake(card) {
        errorStats[card.id] = Math.min(getErrorCount(card) + 1, 6);
        saveErrorStats();
    }

    function recordSuccess(card) {
        const nextValue = Math.max(getErrorCount(card) - 1, 0);
        if (nextValue === 0) {
            delete errorStats[card.id];
        } else {
            errorStats[card.id] = nextValue;
        }
        saveErrorStats();
    }

    function updateBestScoreDisplay() {
        bestScoreEl.textContent = String(bestScore);
        bestScoreEndEl.textContent = String(bestScore);
    }

    function shuffle(items) {
        const copy = items.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
            const j = Math.floor(Math.random() * (i + 1));
            const temp = copy[i];
            copy[i] = copy[j];
            copy[j] = temp;
        }
        return copy;
    }

    function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const mm = String(minutes).padStart(2, '0');
        const ss = String(seconds).padStart(2, '0');
        return mm + ':' + ss;
    }

    function getCurrentCard() {
        return state.deck[state.currentIndex] || null;
    }

    function buildSessionDeck() {
        const deck = [];

        terms.forEach(function (card) {
            const repetitions = 1 + Math.min(getErrorCount(card), 3);
            for (let index = 0; index < repetitions; index += 1) {
                deck.push(card);
            }
        });

        return shuffle(deck);
    }

    function updateStats() {
        timerEl.textContent = formatTime(state.timeLeft);
        passedCountEl.textContent = String(state.passed);
    }

    function clearFeedbackTimer() {
        if (state.feedbackTimerId) {
            clearTimeout(state.feedbackTimerId);
            state.feedbackTimerId = null;
        }
    }

    function getOptionTexts(card) {
        const otherTranslations = Array.from(new Set(
            terms
                .map(function (item) { return item.translation; })
                .filter(function (translation) { return translation !== card.translation; })
        ));

        return shuffle([card.translation].concat(shuffle(otherTranslations).slice(0, 3)));
    }

    function renderOptions() {
        optionButtons.forEach(function (button, index) {
            const optionText = state.options[index] || '';
            button.textContent = optionText;
            button.disabled = false;
            button.className = 'option-btn';
        });
    }

    function renderCard() {
        const card = getCurrentCard();
        if (!card) {
            finishSession('completed');
            return;
        }

        clearFeedbackTimer();
        state.answerLocked = false;
        state.paused = false;
        state.options = getOptionTexts(card);

        flashcardEl.classList.remove('is-flipped');
        continueWrapEl.classList.remove('visible');
        frontHintEl.textContent = 'Выбери правильный перевод термина. Если ответ неверный, таймер остановится, и можно будет спокойно прочитать карточку.';
        frontCategoryEl.textContent = card.category;
        backCategoryEl.textContent = card.category;
        frontTermEl.textContent = card.term;
        backTranslationEl.textContent = card.translation;
        backExplanationEl.textContent = card.explanation;
        backExampleEnEl.textContent = card.example;
        backExampleRuEl.textContent = card.exampleRu;
        renderOptions();
    }

    function tick() {
        if (state.ended || state.paused || state.pendingSessionEnd) {
            return;
        }

        state.timeLeft -= 1;
        if (state.timeLeft <= 0) {
            state.timeLeft = 0;
            state.pendingSessionEnd = true;
            if (state.timerId) {
                clearInterval(state.timerId);
                state.timerId = null;
            }
            updateStats();
            if (!state.answerLocked) {
                frontHintEl.textContent = 'Время вышло — ответь на текущую карточку, и после этого сессия завершится.';
            }
            return;
        }

        updateStats();
    }

    function startSession() {
        if (state.timerId) {
            clearInterval(state.timerId);
        }
        clearFeedbackTimer();

        state.deck = buildSessionDeck();
        state.currentIndex = 0;
        state.passed = 0;
        state.timeLeft = SESSION_SECONDS;
        state.ended = false;
        state.paused = false;
        state.pendingSessionEnd = false;

        endScreenEl.style.display = 'none';
        sessionScreenEl.style.display = 'block';
        recordMessageEl.textContent = '';
        updateBestScoreDisplay();
        updateStats();
        renderCard();
        state.timerId = setInterval(tick, 1000);
    }

    function finishSession(reason) {
        if (state.ended) {
            return;
        }

        state.ended = true;
        if (state.timerId) {
            clearInterval(state.timerId);
            state.timerId = null;
        }
        clearFeedbackTimer();

        sessionScreenEl.style.display = 'none';
        endScreenEl.style.display = 'block';
        finalCountEl.textContent = String(state.passed);

        if (state.passed > bestScore) {
            bestScore = state.passed;
            saveBestScore(bestScore);
            recordMessageEl.textContent = '🎉 Новый рекорд!';
        } else if (bestScore > 0) {
            recordMessageEl.textContent = 'Рекорд сохранён на этом устройстве.';
        } else {
            recordMessageEl.textContent = '';
        }

        updateBestScoreDisplay();

        if (reason === 'completed') {
            endTitleEl.textContent = 'Ты прошёл все карточки!';
            endTextEl.textContent = 'Супер! Ты успел закончить весь набор терминов до конца минутной сессии.';
        } else {
            endTitleEl.textContent = 'Время вышло!';
            endTextEl.textContent = 'Ты закончил текущую карточку, и теперь можно посмотреть результат за 1 минуту.';
        }
    }

    function moveCurrentCardToEnd() {
        const card = state.deck.splice(state.currentIndex, 1)[0];
        if (!card) {
            if (state.pendingSessionEnd) {
                finishSession('timeout');
                return;
            }
            renderCard();
            return;
        }

        if (state.currentIndex >= state.deck.length) {
            state.currentIndex = 0;
        }
        state.deck.push(card);

        if (state.pendingSessionEnd) {
            finishSession('timeout');
            return;
        }

        renderCard();
    }

    function completeCurrentCard() {
        state.passed += 1;
        state.deck.splice(state.currentIndex, 1);
        if (state.currentIndex >= state.deck.length) {
            state.currentIndex = 0;
        }
        updateStats();

        if (state.pendingSessionEnd) {
            finishSession('timeout');
            return;
        }

        renderCard();
    }

    function handleOptionClick(index) {
        if (state.ended || state.answerLocked || state.paused) {
            return;
        }

        const card = getCurrentCard();
        const selectedText = state.options[index];
        if (!card || !selectedText) {
            return;
        }

        state.answerLocked = true;

        optionButtons.forEach(function (button, buttonIndex) {
            button.disabled = true;
            if (state.options[buttonIndex] === card.translation) {
                button.classList.add('correct');
            }
        });

        if (selectedText === card.translation) {
            recordSuccess(card);
            frontHintEl.textContent = state.pendingSessionEnd ? 'Верно! Это был последний ответ сессии.' : 'Верно!';
            state.feedbackTimerId = setTimeout(function () {
                completeCurrentCard();
            }, 450);
            return;
        }

        recordMistake(card);
        optionButtons[index].classList.remove('correct');
        optionButtons[index].classList.add('incorrect');
        state.paused = true;
        frontHintEl.textContent = state.pendingSessionEnd
            ? 'Неверно. Время уже вышло — прочитай карточку и нажми «Продолжить», чтобы завершить сессию.'
            : 'Неверно. Таймер остановлен — прочитай карточку и нажми «Продолжить».';
        flashcardEl.classList.add('is-flipped');
        continueWrapEl.classList.add('visible');
    }

    function continueAfterWrongAnswer() {
        if (state.ended || !state.paused) {
            return;
        }

        state.paused = false;
        moveCurrentCardToEnd();
    }

    optionButtons.forEach(function (button, index) {
        button.addEventListener('click', function () {
            handleOptionClick(index);
        });
    });
    continueBtn.addEventListener('click', continueAfterWrongAnswer);
    retryBtn.addEventListener('click', startSession);

    document.addEventListener('keydown', function (event) {
        if (state.ended) {
            if (event.key === 'Enter') {
                startSession();
            }
            return;
        }

        if (state.paused) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                continueAfterWrongAnswer();
            }
            return;
        }

        const optionIndex = Number(event.key) - 1;
        if (optionIndex >= 0 && optionIndex < 4) {
            handleOptionClick(optionIndex);
        }
    });

    startSession();
</script>
</body>
</html>
